<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free QR Code Generator</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 32rem;
        margin: 3rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin: 1rem 0;
      }
      #url {
        flex: 1;
        padding: 0.5rem;
        font-size: 1rem;
      }
      #generate,
      #downloads button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      #downloads button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      #downloads {
        margin-top: 1rem;
      }
      #preview svg {
        max-width: 100%;
        height: auto;
      }
      #size-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1rem 0;
      }
      #size {
        padding: 0.4rem;
        font-size: 1rem;
      }
      #error {
        color: #c00;
        min-height: 1.5rem;
        margin: 0.25rem 0;
      }
      #support {
        margin-top: 4rem;
        padding-top: 1.5rem;
        border-top: 1px solid #eee;
        text-align: center;
        color: #777;
        font-size: 0.9rem;
      }
      #support h2 {
        font-size: 1rem;
        font-weight: 600;
        color: #555;
        margin: 0 0 0.25rem;
      }
      #support img {
        width: 220px;
        max-width: 100%;
        height: auto;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>Free QR Code Generator</h1>
    <p>Paste a URL and generate a QR code. Everything runs in your browser.</p>

    <div class="row">
      <input id="url" type="text" placeholder="https://example.com" />
      <button id="generate">Generate</button>
    </div>

    <div id="size-row">
      <label for="size">Size</label>
      <select id="size">
        <option value="256">Small (256px)</option>
        <option value="512" selected>Medium (512px)</option>
        <option value="1024">Large (1024px)</option>
      </select>
    </div>

    <p id="error" role="alert"></p>
    <div id="preview"></div>

    <div class="row" id="downloads">
      <button id="download-png" disabled>Download PNG</button>
      <button id="download-svg" disabled>Download SVG</button>
    </div>

    <!--
      Support QR (tip jar). This is a *static image*, displayed only — never
      generated by the app (contrast with the QR Code above). To swap it,
      replace ./bankQR.JPG at the repo root with your own payment QR and
      update the src/alt below to match the new filename.
    -->
    <footer id="support">
      <h2>Support this free tool</h2>
      <p>This generator is free and ad-free. If it saved you time, a small tip
        helps keep it running — entirely optional.</p>
      <img src="./bankQR.JPG" alt="Touch 'n Go eWallet payment QR for Chan Qing Yee" />
    </footer>

    <!-- Vendored QR library (no CDN); exposes window.qrcode -->
    <script src="./vendor/qrcode.js"></script>
    <script type="module">
      import { initApp } from "./src/app.js";
      initApp(document, window.qrcode);
    </script>
  </body>
</html>
